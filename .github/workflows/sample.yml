name: Debug Secret

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Debug secret presence
        run: |
          if [ -z "${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}" ]; then
            echo "Secret is EMPTY"
          else
            echo "Secret is SET (length: ${#VAL})"
          fi
        env:
          VAL: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}